<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction Flow — Real Estate Transaction Checklist</title>
    <meta name="description" content="Transaction Flow — shared checklist for real estate agents, buyers, sellers, and transaction coordinators." />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&f[]=cabinet-grotesk@700,800&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/transaction-flow-app/assets/index-fix2.js"></script>
    <link rel="stylesheet" crossorigin href="/transaction-flow-app/assets/index-DEQDGvGW.css">
  </head>
  <body>
    <div id="root"></div>
  <script type="module">
    // ── In-App Notification Bell ──────────────────────────────────────────────
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://xphngfxxyzrsauyffilz.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwaG5nZnh4eXpyc2F1eWZmaWx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDMyODgsImV4cCI6MjA5MjM3OTI4OH0.0ugnMIdBBXB4dURWUZz2p8FC-RwfwSRqF2OGNHF36MM';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const TYPE_LABELS = {
      task_complete: 'Task completed',
      task_due: 'Task due',
      new_transaction: 'New transaction',
      status_change: 'Status changed',
    };
    const TYPE_ICONS = {
      task_complete: '✅',
      task_due: '⏰',
      new_transaction: '🏠',
      status_change: '📋',
    };

    let notifications = [];
    let panelOpen = false;

    // ── Styles ────────────────────────────────────────────────────────────────
    const style = document.createElement('style');
    style.textContent = `
      #tf-bell-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      #tf-bell-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        color: var(--muted-foreground, #6b7280);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
        position: relative;
      }
      #tf-bell-btn:hover { background: var(--secondary, #f3f4f6); color: var(--foreground, #111); }
      #tf-bell-badge {
        position: absolute;
        top: 4px; right: 4px;
        background: #ef4444;
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        min-width: 16px;
        height: 16px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 3px;
        line-height: 1;
        pointer-events: none;
      }
      #tf-notif-panel {
        position: fixed;
        top: 60px;
        right: 12px;
        left: 12px;
        width: auto;
        max-width: 380px;
        margin-left: auto;
        background: var(--card, #fff);
        border: 1px solid var(--border, #e5e7eb);
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.18);
        z-index: 9999;
        overflow: hidden;
        display: none;
        flex-direction: column;
        max-height: calc(100vh - 80px);
      }
      #tf-notif-panel.open { display: flex; }
      .tf-notif-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border, #e5e7eb);
        flex-shrink: 0;
      }
      .tf-notif-header h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--foreground, #111);
        letter-spacing: -0.01em;
      }
      .tf-mark-all {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        color: var(--primary, #0ea5e9);
        padding: 2px 6px;
        border-radius: 4px;
      }
      .tf-mark-all:hover { opacity: 0.75; }
      #tf-notif-list {
        overflow-y: auto;
        flex: 1;
      }
      .tf-notif-empty {
        padding: 32px 16px;
        text-align: center;
        color: var(--muted-foreground, #6b7280);
        font-size: 13px;
      }
      .tf-notif-item {
        display: flex;
        gap: 10px;
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid var(--border, #f3f4f6);
        transition: background 0.12s;
        align-items: flex-start;
      }
      .tf-notif-item:last-child { border-bottom: none; }
      .tf-notif-item:hover { background: var(--secondary, #f9fafb); }
      .tf-notif-item.unread { background: color-mix(in srgb, var(--primary, #0ea5e9) 5%, transparent); }
      .tf-notif-item.unread:hover { background: color-mix(in srgb, var(--primary, #0ea5e9) 10%, transparent); }
      .tf-notif-icon {
        font-size: 18px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .tf-notif-body { flex: 1; min-width: 0; }
      .tf-notif-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--foreground, #111);
        margin: 0 0 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tf-notif-desc {
        font-size: 11.5px;
        color: var(--muted-foreground, #6b7280);
        margin: 0;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .tf-notif-time {
        font-size: 10.5px;
        color: var(--muted-foreground, #9ca3af);
        margin-top: 4px;
        display: block;
      }
      .tf-unread-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--primary, #0ea5e9);
        flex-shrink: 0;
        margin-top: 5px;
      }
    `;
    document.head.appendChild(style);

    // ── Helpers ───────────────────────────────────────────────────────────────
    function timeAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderPanel() {
      const list = document.getElementById('tf-notif-list');
      const badge = document.getElementById('tf-bell-badge');
      if (!list) return;

      const unread = notifications.filter(n => !n.read);
      badge.textContent = unread.length;
      badge.style.display = unread.length > 0 ? 'flex' : 'none';

      if (notifications.length === 0) {
        list.innerHTML = '<div class="tf-notif-empty">No notifications yet</div>';
        return;
      }

      list.innerHTML = notifications.map(n => `
        <div class="tf-notif-item ${n.read ? '' : 'unread'}" data-id="${n.id}">
          <span class="tf-notif-icon">${TYPE_ICONS[n.type] || '🔔'}</span>
          <div class="tf-notif-body">
            <p class="tf-notif-title">${escHtml(n.title)}</p>
            ${n.body ? `<p class="tf-notif-desc">${escHtml(n.body)}</p>` : ''}
            <span class="tf-notif-time">${timeAgo(n.created_at)}</span>
          </div>
          ${!n.read ? '<div class="tf-unread-dot"></div>' : ''}
        </div>
      `).join('');

      list.querySelectorAll('.tf-notif-item').forEach(el => {
        el.addEventListener('click', () => markRead(Number(el.dataset.id)));
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Data ──────────────────────────────────────────────────────────────────
    async function fetchNotifications() {
      const { data, error } = await sb
        .from('notifications')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);
      if (!error && data) {
        notifications = data;
        renderPanel();
      }
    }

    async function markRead(id) {
      notifications = notifications.map(n => n.id === id ? { ...n, read: true } : n);
      renderPanel();
      await sb.from('notifications').update({ read: true }).eq('id', id);
    }

    async function markAllRead() {
      notifications = notifications.map(n => ({ ...n, read: true }));
      renderPanel();
      await sb.from('notifications').update({ read: true }).eq('read', false);
    }

    // ── Realtime ──────────────────────────────────────────────────────────────
    function subscribeRealtime() {
      sb.channel('notifications-feed')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, payload => {
          notifications = [payload.new, ...notifications];
          renderPanel();
          // Brief bell wiggle
          const btn = document.getElementById('tf-bell-btn');
          if (btn) { btn.style.animation = 'none'; btn.offsetHeight; btn.style.animation = 'tf-wiggle 0.4s ease'; }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'notifications' }, payload => {
          notifications = notifications.map(n => n.id === payload.new.id ? payload.new : n);
          renderPanel();
        })
        .subscribe();
    }

    // ── Mount ─────────────────────────────────────────────────────────────────
    function buildBellHTML() {
      return `
        <button id="tf-bell-btn" aria-label="Notifications">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="tf-bell-badge" style="display:none">0</span>
        </button>
        <div id="tf-notif-panel">
          <div class="tf-notif-header">
            <h3>Notifications</h3>
            <button class="tf-mark-all" id="tf-mark-all-btn">Mark all read</button>
          </div>
          <div id="tf-notif-list"></div>
        </div>
      `;
    }

    function attachBellListeners() {
      document.getElementById('tf-bell-btn').addEventListener('click', e => {
        e.stopPropagation();
        panelOpen = !panelOpen;
        document.getElementById('tf-notif-panel').classList.toggle('open', panelOpen);
      });
      document.getElementById('tf-mark-all-btn').addEventListener('click', e => {
        e.stopPropagation();
        markAllRead();
      });
      document.addEventListener('click', e => {
        if (!document.getElementById('tf-bell-wrap')?.contains(e.target)) {
          panelOpen = false;
          document.getElementById('tf-notif-panel')?.classList.remove('open');
        }
      });
    }

    function mountBell() {
      if (document.getElementById('tf-bell-wrap')) return true; // already mounted

      const wrap = document.createElement('div');
      wrap.id = 'tf-bell-wrap';
      wrap.innerHTML = buildBellHTML();

      // Strategy 1: Dashboard — insert before the theme toggle button
      const themeBtn = document.querySelector('[aria-label="Toggle theme"]');
      if (themeBtn) {
        themeBtn.parentNode.insertBefore(wrap, themeBtn);
        attachBellListeners();
        return true;
      }

      // Strategy 2: Client/transaction view — the header is a <header> element
      // (no theme toggle in this view, just address + status badge)
      const header = document.querySelector('header');
      if (header) {
        header.appendChild(wrap);
        attachBellListeners();
        return true;
      }

      return false;
    }

    // ── Wiggle keyframe ───────────────────────────────────────────────────────
    const wiggle = document.createElement('style');
    wiggle.textContent = `@keyframes tf-wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-15deg)} 75%{transform:rotate(15deg)} }`;
    document.head.appendChild(wiggle);

    // Wait for React to render the header, then mount
    let realtimeSubscribed = false;
    function tryMount(attempts = 0) {
      if (mountBell()) {
        fetchNotifications();
        if (!realtimeSubscribed) {
          subscribeRealtime();
          realtimeSubscribed = true;
          setInterval(renderPanel, 60000);
        }
      } else if (attempts < 30) {
        setTimeout(() => tryMount(attempts + 1), 300);
      }
    }
    tryMount();

    // Re-mount bell on hash/route changes (dashboard ↔ client view)
    window.addEventListener('hashchange', () => {
      // Remove existing bell so it re-injects into the new view's header
      document.getElementById('tf-bell-wrap')?.remove();
      panelOpen = false;
      setTimeout(() => tryMount(), 400);
    });
  </script>
  </body>
</html>
